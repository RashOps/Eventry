name: Sync to Hugging Face Hub

on:
  push:
    branches: [main, dev]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://RashOps:$HF_TOKEN@huggingface.co/spaces/RashOps/Eventry HEAD:main