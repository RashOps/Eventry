name: Release Desktop Application

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v0.1.1, etc.
  workflow_dispatch:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary to generate changelog from history

      - name: Setup mise (Environment Manager)
        uses: jdx/mise-action@v2

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Rust Cache Setup
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "frontend/src-tauri -> target"

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          bun install

      - name: Build Changelog
        id: github_release
        uses: mikepenz/release-changelog-builder-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri Desktop Application (.exe)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Eventry ${{ github.ref_name }}"
          releaseBody: ${{ steps.github_release.outputs.changelog }}
          releaseDraft: true
          prerelease: false
          projectPath: "./frontend"
          args: ""